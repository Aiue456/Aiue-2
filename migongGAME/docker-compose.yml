version: '3.8'

services:
  server:
    build: ./server
    container_name: campus-server
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3001:3001"

  client:
    build: ./client
    container_name: campus-client
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    depends_on:
      - server
